<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sales and Customer Analytics Intelligence Platform</title>
  <desc id="desc">A dark professional banner for a full-stack sales analytics platform with ETL, dashboards, XGBoost forecasting, and Gaussian Mixture customer segmentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#0F1B2D"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="card" x1="80" y1="70" x2="1320" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#172033" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="40" y="36" width="1320" height="288" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1400" height="360" rx="0" fill="url(#bg)"/>
  <circle cx="1110" cy="62" r="180" fill="#2563EB" opacity="0.18"/>
  <circle cx="1225" cy="295" r="160" fill="#22C55E" opacity="0.13"/>
  <circle cx="170" cy="310" r="180" fill="#F59E0B" opacity="0.11"/>

  <rect x="80" y="58" width="1240" height="244" rx="28" fill="url(#card)" stroke="#334155" filter="url(#shadow)"/>

  <g transform="translate(118 96)">
    <rect x="0" y="0" width="126" height="126" rx="24" fill="#0B1220" stroke="#334155"/>
    <rect x="24" y="74" width="14" height="28" rx="5" fill="#60A5FA"/>
    <rect x="50" y="48" width="14" height="54" rx="5" fill="#22C55E"/>
    <rect x="76" y="28" width="14" height="74" rx="5" fill="#F59E0B"/>
    <path d="M24 42C40 36 50 30 65 34C80 38 90 25 103 20" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>
    <circle cx="103" cy="20" r="6" fill="#A78BFA"/>
  </g>

  <text x="280" y="132" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">
    Sales &amp; Customer Analytics
  </text>
  <text x="280" y="180" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="600">
    ETL, SQL analytics, XGBoost forecasting, and customer segmentation
  </text>
  <text x="280" y="222" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    FastAPI + React + SQLAlchemy + PostgreSQL-compatible models + Machine Learning
  </text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="280" y="248" width="104" height="34" rx="17" fill="#1D4ED8"/>
    <text x="306" y="270" fill="#EFF6FF">FastAPI</text>
    <rect x="398" y="248" width="96" height="34" rx="17" fill="#0F766E"/>
    <text x="424" y="270" fill="#F0FDFA">React</text>
    <rect x="508" y="248" width="112" height="34" rx="17" fill="#C2410C"/>
    <text x="530" y="270" fill="#FFF7ED">XGBoost</text>
    <rect x="634" y="248" width="182" height="34" rx="17" fill="#6D28D9"/>
    <text x="657" y="270" fill="#F5F3FF">Gaussian Mixture</text>
  </g>

  <g transform="translate(1035 105)">
    <rect x="0" y="0" width="210" height="150" rx="22" fill="#0B1220" stroke="#334155"/>
    <text x="26" y="42" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Pipeline</text>
    <path d="M34 75H174" stroke="#334155" stroke-width="3"/>
    <circle cx="42" cy="75" r="11" fill="#60A5FA"/>
    <circle cx="88" cy="75" r="11" fill="#22C55E"/>
    <circle cx="134" cy="75" r="11" fill="#F59E0B"/>
    <circle cx="174" cy="75" r="11" fill="#A78BFA"/>
    <text x="28" y="118" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">CSV -> DB -> API -> ML -> UI</text>
  </g>
</svg>
